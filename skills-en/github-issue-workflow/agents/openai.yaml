interface:
  display_name: "GitHub Issue Workflow"
  short_description: "Issue-first tracking, labels, templates, and progress comments"
  default_prompt: "Use $github-issue-workflow to track GitHub work with issue-first triage, templates, labels, and progress comments."

dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "GitHub MCP server"
      transport: "streamable_http"
      url: "https://api.githubcopilot.com/mcp/"

policy:
  allow_implicit_invocation: true
